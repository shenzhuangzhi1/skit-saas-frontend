name: Frontend CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: skit-saas-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/skit-saas-frontend
  IMAGE_TAG: ${{ github.sha }}
  RELEASE_ID: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  build-and-deploy:
    if: github.ref == 'refs/heads/master'
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify callback log safety
        run: |
          bash deploy/test-callback-log-safety.sh
          ./deploy/test-release-security.sh

      - name: Run product tests
        run: |
          pnpm test:unit
          node --test test/*.test.mjs

      - name: Verify types and production lint
        run: |
          pnpm ts:check
          pnpm lint

      - name: Build production assets
        env:
          VITE_BASE_URL: ''
          VITE_API_URL: /admin-api
        run: pnpm build:prod

      - name: Login to GHCR
        run: echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        run: |
          set -euo pipefail
          mkdir -p .deploy
          chmod +x deploy/activate-frontend.sh deploy/cleanup-frontend-release-env.sh
          docker buildx build \
            --label app=skit-saas-frontend \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            -f deploy/Dockerfile \
            -t "${IMAGE_NAME}:${IMAGE_TAG}" \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .
          cp deploy/activate-frontend.sh .deploy/activate-frontend.sh
          cp deploy/cleanup-frontend-release-env.sh .deploy/cleanup-frontend-release-env.sh

      - name: Detect deployment secrets
        id: deploy_config
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          if [ -n "${SERVER_HOST}" ] && [ -n "${SERVER_USER}" ] && { [ -n "${SERVER_SSH_KEY}" ] || [ -n "${SERVER_PASSWORD}" ]; }; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::Deployment skipped because SERVER_HOST, SERVER_USER, and one of SERVER_SSH_KEY or SERVER_PASSWORD are not configured."
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare SSH
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Set SERVER_HOST secret}"
          AUTH_VALUE="${SERVER_SSH_KEY:-${SERVER_PASSWORD:-}}"
          : "${AUTH_VALUE:?Set SERVER_SSH_KEY or SERVER_PASSWORD secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          install -m 700 -d ~/.ssh
          KEY_FILE="$HOME/.ssh/skit_deploy_key"
          if printf '%s' "${AUTH_VALUE}" | grep -q -- '-----BEGIN .*PRIVATE KEY-----'; then
            printf '%s' "${AUTH_VALUE}" | perl -0pe 's/\\n/\n/g; s/\r\n?/\n/g; s/\n?$/\n/' > "${KEY_FILE}"
            chmod 600 "${KEY_FILE}"
            if ! ssh-keygen -y -P "" -f "${KEY_FILE}" >/dev/null; then
              echo "::error::SERVER_SSH_KEY looks like a private key, but it is not readable. Use an unencrypted private key or set SERVER_PASSWORD instead."
              exit 1
            fi
            printf 'SKIT_AUTH_MODE=key\n' > .deploy/ssh-auth.env
          else
            if printf '%s' "${AUTH_VALUE}" | tr -d '\r\n ' | base64 -d > "${KEY_FILE}" 2>/tmp/skit_key_decode_error \
              && chmod 600 "${KEY_FILE}" \
              && ssh-keygen -y -P "" -f "${KEY_FILE}" >/dev/null 2>&1; then
              printf 'SKIT_AUTH_MODE=key\n' > .deploy/ssh-auth.env
            else
              sudo apt-get update
              sudo apt-get install -y sshpass
              {
                printf 'SKIT_AUTH_MODE=password\n'
                printf 'SKIT_SSH_PASSWORD=%q\n' "${AUTH_VALUE}"
              } > .deploy/ssh-auth.env
            fi
          fi
          chmod 600 .deploy/ssh-auth.env
          cat > .deploy/ssh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$(dirname "$0")/ssh-auth.env"
          SERVER_PORT="${SERVER_PORT:-22}"
          if [ "${SKIT_AUTH_MODE}" = "password" ]; then
            SSHPASS="${SKIT_SSH_PASSWORD}" sshpass -e ssh -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -p "${SERVER_PORT}" "$@"
          else
            ssh -i "$HOME/.ssh/skit_deploy_key" -p "${SERVER_PORT}" "$@"
          fi
          EOF
          cat > .deploy/scp <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          # shellcheck disable=SC1091
          . "$(dirname "$0")/ssh-auth.env"
          SERVER_PORT="${SERVER_PORT:-22}"
          if [ "${SKIT_AUTH_MODE}" = "password" ]; then
            SSHPASS="${SKIT_SSH_PASSWORD}" sshpass -e scp -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -P "${SERVER_PORT}" "$@"
          else
            scp -i "$HOME/.ssh/skit_deploy_key" -P "${SERVER_PORT}" "$@"
          fi
          EOF
          chmod +x .deploy/ssh .deploy/scp
          if [ "${SERVER_PORT}" != "22" ]; then
            echo "::error::The pinned production SSH host key currently authorizes port 22 only."
            exit 1
          fi
          install -m 600 deploy/known_hosts ~/.ssh/known_hosts
          ssh-keygen -F "${SERVER_HOST}" -f ~/.ssh/known_hosts >/dev/null \
            || { echo "::error::SERVER_HOST is not present in deploy/known_hosts"; exit 1; }

      - name: Upload release bundle
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          : "${SERVER_USER:?Set SERVER_USER secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-skit-saas}"
          RELEASE_BUNDLE_PATH="${DEPLOY_PATH}/releases/frontend-${RELEASE_ID}"
          SSH_TARGET="${SERVER_USER}@${SERVER_HOST}"
          chmod +x .deploy/activate-frontend.sh
          .deploy/ssh "${SSH_TARGET}" \
            "mkdir -p '${DEPLOY_PATH}/releases' && mkdir -- '${RELEASE_BUNDLE_PATH}'"
          .deploy/scp \
            ".deploy/activate-frontend.sh" \
            ".deploy/cleanup-frontend-release-env.sh" \
            "${SSH_TARGET}:${RELEASE_BUNDLE_PATH}/"

      - name: Activate frontend on server
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_SUDO_PASSWORD: ${{ secrets.SERVER_SUDO_PASSWORD }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          set -euo pipefail
          trap 'rm -f .deploy/server.env' EXIT
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-skit-saas}"
          RELEASE_BUNDLE_PATH="${DEPLOY_PATH}/releases/frontend-${RELEASE_ID}"
          SSH_TARGET="${SERVER_USER}@${SERVER_HOST}"
          SUDO_PASSWORD="${SERVER_SUDO_PASSWORD:-${SERVER_PASSWORD:-}}"
          install -m 600 /dev/null .deploy/server.env
          {
            printf 'FRONTEND_PORT=%q\n' "${FRONTEND_PORT:-80}"
            printf 'GHCR_USERNAME=%q\n' "${GHCR_USERNAME}"
            printf 'GHCR_TOKEN=%q\n' "${GHCR_TOKEN}"
            printf 'SUDO_PASSWORD=%q\n' "${SUDO_PASSWORD}"
          } > .deploy/server.env
          chmod 600 .deploy/server.env
          .deploy/scp \
            ".deploy/server.env" \
            "${SSH_TARGET}:${RELEASE_BUNDLE_PATH}/server.env"
          printf -v DEPLOY_PATH_Q '%q' "${DEPLOY_PATH}"
          printf -v RELEASE_ID_Q '%q' "${RELEASE_ID}"
          printf -v RELEASE_BUNDLE_PATH_Q '%q' "${RELEASE_BUNDLE_PATH}"
          printf -v IMAGE_NAME_Q '%q' "${IMAGE_NAME}"
          printf -v IMAGE_TAG_Q '%q' "${IMAGE_TAG}"
          .deploy/ssh "${SSH_TARGET}" \
            "DEPLOY_PATH=${DEPLOY_PATH_Q} RELEASE_ID=${RELEASE_ID_Q} RELEASE_BUNDLE_PATH=${RELEASE_BUNDLE_PATH_Q} IMAGE_NAME=${IMAGE_NAME_Q} IMAGE_TAG=${IMAGE_TAG_Q} bash -s" <<'REMOTE'
          set -euo pipefail
          remote_server_env_file="${RELEASE_BUNDLE_PATH}/server.env"
          remote_activation_script="${RELEASE_BUNDLE_PATH}/activate-frontend.sh"
          remote_cleanup_script="${RELEASE_BUNDLE_PATH}/cleanup-frontend-release-env.sh"
          cleanup_remote_server_env() {
            cleanup_status="${1:-0}"
            trap - EXIT HUP INT TERM
            DEPLOY_PATH="${DEPLOY_PATH}" RELEASE_ID="${RELEASE_ID}" \
              bash "${remote_cleanup_script}" || true
            exit "${cleanup_status}"
          }
          trap 'cleanup_remote_server_env $?' EXIT
          trap 'cleanup_remote_server_env 129' HUP
          trap 'cleanup_remote_server_env 130' INT
          trap 'cleanup_remote_server_env 143' TERM
          chmod 600 -- "${remote_server_env_file}"
          chmod +x -- "${remote_activation_script}"
          DEPLOY_PATH="${DEPLOY_PATH}" \
            RELEASE_BUNDLE_PATH="releases/frontend-${RELEASE_ID}" \
            IMAGE_NAME="${IMAGE_NAME}" \
            IMAGE_TAG="${IMAGE_TAG}" \
            "${remote_activation_script}"
          REMOTE

      - name: Remove staged frontend server environment
        if: always() && steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [ ! -x .deploy/ssh ]; then
            echo "::notice::Remote server.env cleanup skipped because SSH setup did not complete."
            exit 0
          fi
          : "${SERVER_USER:?Set SERVER_USER secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-skit-saas}"
          RELEASE_BUNDLE_PATH="${DEPLOY_PATH}/releases/frontend-${RELEASE_ID}"
          REMOTE_CLEANUP_SCRIPT="${RELEASE_BUNDLE_PATH}/cleanup-frontend-release-env.sh"
          SSH_TARGET="${SERVER_USER}@${SERVER_HOST}"
          printf -v DEPLOY_PATH_Q '%q' "${DEPLOY_PATH}"
          printf -v RELEASE_ID_Q '%q' "${RELEASE_ID}"
          printf -v REMOTE_CLEANUP_SCRIPT_Q '%q' "${REMOTE_CLEANUP_SCRIPT}"
          .deploy/ssh "${SSH_TARGET}" \
            "DEPLOY_PATH=${DEPLOY_PATH_Q} RELEASE_ID=${RELEASE_ID_Q} bash ${REMOTE_CLEANUP_SCRIPT_Q}"
