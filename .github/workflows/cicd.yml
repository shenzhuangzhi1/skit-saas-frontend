name: Frontend CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skit-saas-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: skit-saas-frontend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production assets
        env:
          VITE_BASE_URL: ""
          VITE_API_URL: /admin-api
          VITE_SKIT_DEMO_LOGIN: ${{ vars.VITE_SKIT_DEMO_LOGIN || 'true' }}
          VITE_APP_DEFAULT_LOGIN_USERNAME: ${{ vars.VITE_APP_DEFAULT_LOGIN_USERNAME || '123456' }}
          VITE_APP_DEFAULT_LOGIN_PASSWORD: ${{ vars.VITE_APP_DEFAULT_LOGIN_PASSWORD || '123456' }}
        run: pnpm build:prod

      - name: Build Docker image archive
        run: |
          set -euo pipefail
          mkdir -p .deploy
          chmod +x deploy/activate-frontend.sh
          docker build \
            --label app=skit-saas-frontend \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            -f deploy/Dockerfile \
            -t "${IMAGE_NAME}:${IMAGE_TAG}" \
            .
          docker save "${IMAGE_NAME}:${IMAGE_TAG}" | gzip > ".deploy/${IMAGE_NAME}-${IMAGE_TAG}.tar.gz"
          cp deploy/activate-frontend.sh .deploy/activate-frontend.sh

      - name: Detect deployment secrets
        id: deploy_config
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [ -n "${SERVER_HOST}" ] && [ -n "${SERVER_USER}" ] && [ -n "${SERVER_SSH_KEY}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "::notice::Deployment skipped because SERVER_HOST, SERVER_USER, or SERVER_SSH_KEY is not configured."
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Prepare SSH
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${SERVER_HOST:?Set SERVER_HOST secret}"
          : "${SERVER_SSH_KEY:?Set SERVER_SSH_KEY secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          install -m 700 -d ~/.ssh
          KEY_FILE="$HOME/.ssh/skit_deploy_key"
          if printf '%s' "${SERVER_SSH_KEY}" | grep -q -- '-----BEGIN .*PRIVATE KEY-----'; then
            printf '%s' "${SERVER_SSH_KEY}" | perl -0pe 's/\\n/\n/g; s/\r\n?/\n/g; s/\n?$/\n/' > "${KEY_FILE}"
          else
            if ! printf '%s' "${SERVER_SSH_KEY}" | tr -d '\r\n ' | base64 -d > "${KEY_FILE}" 2>/tmp/skit_key_decode_error; then
              echo "::error::SERVER_SSH_KEY must be an unencrypted private key in raw multiline format, literal \\n format, or base64 format."
              exit 1
            fi
          fi
          chmod 600 "${KEY_FILE}"
          if ! ssh-keygen -y -f "${KEY_FILE}" >/dev/null; then
            echo "::error::SERVER_SSH_KEY is not a readable unencrypted private key."
            exit 1
          fi
          ssh-keyscan -p "${SERVER_PORT}" "${SERVER_HOST}" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          : "${SERVER_USER:?Set SERVER_USER secret}"
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/skit-saas}"
          SSH_TARGET="${SERVER_USER}@${SERVER_HOST}"
          ssh -i ~/.ssh/skit_deploy_key -p "${SERVER_PORT}" "${SSH_TARGET}" \
            "mkdir -p '${DEPLOY_PATH}/images'"
          scp -i ~/.ssh/skit_deploy_key -P "${SERVER_PORT}" \
            ".deploy/${IMAGE_NAME}-${IMAGE_TAG}.tar.gz" \
            ".deploy/activate-frontend.sh" \
            "${SSH_TARGET}:${DEPLOY_PATH}/"

      - name: Activate frontend on server
        if: steps.deploy_config.outputs.enabled == 'true'
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
        run: |
          set -euo pipefail
          SERVER_PORT="${SERVER_PORT:-22}"
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/skit-saas}"
          SSH_TARGET="${SERVER_USER}@${SERVER_HOST}"
          ssh -i ~/.ssh/skit_deploy_key -p "${SERVER_PORT}" "${SSH_TARGET}" \
            "chmod +x '${DEPLOY_PATH}/activate-frontend.sh' && FRONTEND_PORT='${FRONTEND_PORT:-80}' DEPLOY_PATH='${DEPLOY_PATH}' IMAGE_NAME='${IMAGE_NAME}' IMAGE_TAG='${IMAGE_TAG}' '${DEPLOY_PATH}/activate-frontend.sh'"
