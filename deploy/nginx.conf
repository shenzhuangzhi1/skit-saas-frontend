 # The public TLS proxy canonicalizes these headers before traffic reaches this loopback-only container.
map $http_x_real_ip $skit_client_ip {
  default $http_x_real_ip;
  '' $remote_addr;
}

map $http_x_forwarded_for $skit_forwarded_for {
  default $http_x_forwarded_for;
  '' $remote_addr;
}

map $http_x_forwarded_proto $skit_forwarded_proto {
  default $http_x_forwarded_proto;
  '' $scheme;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  client_max_body_size 100m;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Provider callback URLs contain a write-only routing key. Never put the path or query in access logs.
  # A proxy_pass without a URI component preserves the original URI and query for signature verification.
  location ^~ /app-api/skit/ad-callback/taku/ {
    access_log off;
    error_log /dev/null crit;
    proxy_pass http://backend:48080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $skit_client_ip;
    proxy_set_header X-Forwarded-For $skit_forwarded_for;
    proxy_set_header X-Forwarded-Proto $skit_forwarded_proto;
    proxy_read_timeout 10s;
  }

  location ~ ^/(admin-api|app-api|infra/ws|druid|doc.html|swagger-ui|jmreport|drag|admin/applications) {
    proxy_pass http://backend:48080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $skit_client_ip;
    proxy_set_header X-Forwarded-For $skit_forwarded_for;
    proxy_set_header X-Forwarded-Proto $skit_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
  }
}
