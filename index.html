<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="keywords" content="短剧 SaaS 管理平台" />
    <meta name="description" content="短剧 SaaS 管理平台" />
    <title>%VITE_APP_TITLE%</title>
  </head>
  <body>
    <div id="app">
      <style>
        .app-loading {
          position: fixed;
          display: grid;
          color: #202231;
          background: #f6f7fb;
          inset: 0;
          place-items: center;
        }

        .app-loading .app-loading-wrap {
          display: flex;
          width: min(280px, calc(100vw - 48px));
          flex-direction: column;
          align-items: center;
        }

        .app-loading .app-loading-brand {
          display: grid;
          width: 56px;
          height: 56px;
          padding: 11px;
          background: #6266e8;
          border-radius: 14px;
          box-shadow: 0 18px 38px -24px rgb(64 70 190 / 72%);
          grid-template-columns: repeat(3, 1fr);
          gap: 4px;
        }

        .app-loading .app-loading-brand i {
          display: block;
          align-self: center;
          background: #fff;
          border-radius: 2px;
        }

        .app-loading .app-loading-brand i:nth-child(1) {
          height: 18px;
          align-self: end;
        }

        .app-loading .app-loading-brand i:nth-child(2) {
          height: 28px;
        }

        .app-loading .app-loading-brand i:nth-child(3) {
          height: 13px;
          align-self: start;
        }

        .app-loading .app-loading-title {
          margin-top: 18px;
          font-size: 18px;
          font-weight: 750;
          letter-spacing: -0.02em;
          text-align: center;
        }

        .app-loading .app-loading-subtitle {
          margin-top: 7px;
          font-size: 12px;
          color: #777b8d;
        }

        .app-loading .app-loading-track {
          width: 112px;
          height: 3px;
          margin-top: 24px;
          overflow: hidden;
          background: #e4e6f2;
          border-radius: 999px;
        }

        .app-loading .app-loading-track span {
          display: block;
          width: 100%;
          height: 100%;
          background: #6266e8;
          border-radius: inherit;
          transform: scaleX(0.18);
          transform-origin: left;
          animation: loading-track 1.2s ease-in-out infinite alternate;
        }

        @keyframes loading-track {
          to {
            transform: scaleX(1);
          }
        }

        @media (prefers-color-scheme: dark) {
          .app-loading {
            color: #f4f5fa;
            background: #161821;
          }

          .app-loading .app-loading-subtitle {
            color: #a8acbc;
          }

          .app-loading .app-loading-track {
            background: #303341;
          }
        }

        @media (prefers-reduced-motion: reduce) {
          .app-loading .app-loading-track span {
            animation: none;
            transform: scaleX(0.55);
          }
        }
      </style>
      <div class="app-loading">
        <div class="app-loading-wrap">
          <div class="app-loading-brand" aria-hidden="true">
            <i></i>
            <i></i>
            <i></i>
          </div>
          <div class="app-loading-title">%VITE_APP_TITLE%</div>
          <div class="app-loading-subtitle">正在进入运营工作台</div>
          <div class="app-loading-track" role="status" aria-label="正在加载">
            <span></span>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
